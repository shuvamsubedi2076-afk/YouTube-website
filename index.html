<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .first {
      border-radius: 5px;
      font-size: 20px;
    }

    .search-bar {
      border-radius: 20px;
      padding-top: 5px;
      padding-bottom: 5px;
      padding-left: 7px;
      padding-right: 250px;
      border: none;
      transition: box-shadow 0.2s;
    }

    .search-bar:hover {
      box-shadow: 0px 0px 10px rgba(255, 0, 0, 0.15);
    }
    
    .email {
      padding-right: 100px;
    }

  .Agree-button {
    padding-bottom: 15px;
    padding-left: 50px;
    padding-right: 50px;
    padding-top: 15px;
    background-color: rgb(26, 116, 219);
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 17px;
  }
  p {
    color: rgb(255, 171, 4);
    font-family: arial;
  }
    </style>
</head>
<body>
  <input class="first" type="text" placeholder="Search"><br><br>
  
  <input class="search-bar" type="text" placeholder="Search Google or type a URL">
  
  <p>Email</p><br>
  
  <input class="email"><br>
  <p>By clicking Agree & Join, you agree to the Privacy Policy.</p>
  <button class="Agree-button">
     Agree & Join
  </button>

</body>
</html>
