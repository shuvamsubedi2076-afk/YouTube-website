<!DOCTYPE html>
<html>
  <head>
    <title>Grid Practice</title>
  </head>
  <body style="padding-bottom: 1000px;">

    <div style="
      display: grid;
      grid-template-columns: 100px 100px;
      ">
      <div style="background-color: rgb(221, 143, 143);">Div 1</div>
      <div style="background-color: rgb(127, 127, 226);">Div 2 <P>Text</P></div>
    </div>

    <div style="
      display: grid;
      margin-top: 30px;
      grid-template-columns: 100px 1fr;
      ">
      <div style="background-color: rgb(221, 143, 143);">Div 1</div>
      <div style="background-color: rgb(127, 127, 226);">Div 2 </div>
      <div style="background-color: rgb(221, 143, 143);">Div 3</div>
    </div>

    <div style="
      display: grid;
      margin-top: 30px;
      grid-template-columns: 1fr 1fr 1fr;
      column-gap: 20px;
      row-gap: 40px;
      ">
      <div style="background-color: rgb(221, 143, 143);
      height: 200px;">Div 1</div>
      <div style="background-color: rgb(127, 127, 226);
      height: 200px;">Div 2 </div>
      <div style="background-color: rgb(221, 143, 143);
      height: 200px;">Div 3</div>
      <div style="background-color: rgb(127, 127, 226);
      height: 200px;">Div 2 </div>
      <div style="background-color: rgb(221, 143, 143);
      height: 200px;">Div 3</div>
      <div style="background-color: rgb(127, 127, 226);
      height: 200px;">Div 2 </div>
    </div>
  </body>
</html>
